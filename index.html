<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jonathan Putra — Career Journey</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD: Top-left logo + zone name -->
  <div id="hud-top-left">
    <div id="hud-logo">JONATHAN PUTRA</div>
    <div id="hud-zone-name">BINUS — Campus</div>
  </div>

  <!-- HUD: Top-right collectible counter -->
  <div id="hud-top-right">
    <span id="hud-gem-icon">⭐</span>
    <span id="hud-counter">0 / 17 discovered</span>
  </div>

  <!-- HUD: Bottom nav bar -->
  <div id="hud-bottom-nav">
    <button id="nav-prev" class="nav-arrow">&larr;</button>
    <div id="nav-zones">
      <button class="nav-zone active" data-zone="0">Kid</button>
      <span class="nav-path-line"></span>
      <button class="nav-zone" data-zone="1">BINUS</button>
      <span class="nav-path-line"></span>
      <button class="nav-zone" data-zone="2">BCA</button>
      <span class="nav-path-line"></span>
      <button class="nav-zone" data-zone="3">EY</button>
      <span class="nav-path-line"></span>
      <button class="nav-zone" data-zone="4">Blibli</button>
      <span class="nav-path-line"></span>
      <button class="nav-zone" data-zone="5">GSPE</button>
      <span class="nav-path-line"></span>
      <button class="nav-zone" data-zone="6">Next?</button>
    </div>
    <button id="nav-next" class="nav-arrow">&rarr;</button>
  </div>

  <!-- HUD: Mute button -->
  <button id="mute-btn" title="Toggle sound">&#x1F50A;</button>

  <!-- HUD: Right stats panel -->
  <button id="stats-toggle">&#9776; Stats</button>
  <div id="stats-panel" class="hidden">
    <div id="stats-player-card"></div>
    <div id="stats-skills"></div>
    <div id="stats-badges"></div>
  </div>

  <!-- Zone labels (floating logos) -->
  <div id="zone-labels"></div>

  <!-- Contact card (shown at final zone) -->
  <div id="contact-card" class="hidden">
    <h2 id="contact-title">Let's Connect!</h2>
    <div class="contact-links">
      <a href="mailto:jonathanputra23@gmail.com" class="contact-link">
        <span class="contact-icon">&#9993;</span> jonathanputra23@gmail.com
      </a>
      <a href="https://linkedin.com/in/jonathan-putra/" target="_blank" class="contact-link">
        <span class="contact-icon">in</span> linkedin.com/in/jonathan-putra
      </a>
    </div>
    <button id="reset-btn">Play Again from the Beginning</button>
  </div>

  <!-- Side quests -->
  <div id="side-quests" class="hidden"></div>

  <!-- Dialogue box -->
  <div id="dialogue-box" class="hidden">
    <div id="dialogue-speaker"></div>
    <div id="dialogue-text"></div>
    <div id="dialogue-hint">Click to continue...</div>
  </div>

  <!-- Tooltip (positioned dynamically) -->
  <div id="tooltip" class="hidden">
    <div id="tooltip-text"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
